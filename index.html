  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function getRows(year) {
    if (year === 'all') {
      return Object.keys(DATA).sort(function(a,b){return b-a;}).reduce(function(acc,y){return acc.concat(DATA[y]);}, []);
    }
    return DATA[year] || [];
  }

  function render() {
    var year = document.getElementById('twl-year-select').value;
    var q = document.getElementById('twl-search').value.trim().toLowerCase();
    var rows = getRows(year);
    if (q) {
      rows = rows.filter(function(r) {
        return r.title.toLowerCase().indexOf(q) !== -1 ||
               r.date.indexOf(q) !== -1 ||
               r.type.toLowerCase().indexOf(q) !== -1;
      });
    }
    var tbody = document.getElementById('twl-tbody');
    var badge = document.getElementById('twl-count-badge');
    tbody.innerHTML = '';
    if (rows.length === 0) {
      var tr = document.createElement('tr');
      tr.innerHTML = '<td colspan="3" class="twl-no-results">No announcements found</td>';
      tbody.appendChild(tr);
      badge.textContent = '0 results';
    } else {
      rows.forEach(function(r) {
        var tr = document.createElement('tr');
        tr.innerHTML =
          '<td class="twl-td-date">' + esc(r.date) + '</td>' +
          '<td class="twl-td-title"><a href="' + esc(r.url) + '" target="_blank" rel="noopener">' + esc(r.title) + '</a></td>' +
          '<td class="twl-td-type"><span class="twl-type-badge">' + esc(r.type) + '</span></td>';
        tbody.appendChild(tr);
      });
      badge.textContent = rows.length + ' announcement' + (rows.length !== 1 ? 's' : '');
    }
  }

  document.getElementById('twl-year-select').addEventListener('change', render);
  document.getElementById('twl-search').addEventListener('input', render);
  render();
})();
